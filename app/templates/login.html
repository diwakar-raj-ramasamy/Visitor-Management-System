<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <meta name="description" content="Company Visitor Management System - Secure Login Access"/>
    <title>Login | Company VMS</title>
    
    
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface-container-highest": "#e1e3e4",
                        "surface-bright": "#f8f9fa",
                        "tertiary-fixed": "#d8f3dc",
                        "surface-dim": "#d9dadb",
                        "on-secondary-fixed": "#081c15",
                        "on-secondary": "#ffffff",
                        "on-error": "#ffffff",
                        "secondary-container": "#74c69d",
                        "surface-container-low": "#f3f4f5",
                        "inverse-surface": "#2e3132",
                        "surface-variant": "#e1e3e4",
                        "on-primary-fixed-variant": "#1b4332",
                        "on-secondary-container": "#081c15",
                        "surface-container-high": "#e7e8e9",
                        "on-surface": "#191c1d",
                        "on-primary": "#ffffff",
                        "error": "#ba1a1a",
                        "on-tertiary-container": "#000416",
                        "surface-tint": "#0f6d38",
                        "primary-fixed-dim": "#b7e4c7",
                        "on-error-container": "#93000a",
                        "on-primary-container": "#ffffff",
                        "secondary-fixed": "#d8f3dc",
                        "on-tertiary-fixed-variant": "#1b4332",
                        "secondary": "#2d6a4f",
                        "outline": "#727785",
                        "outline-variant": "#c1c6d6",
                        "primary": "#0f6d38",
                        "inverse-primary": "#b7e4c7",
                        "tertiary": "#1b4332",
                        "on-background": "#191c1d",
                        "surface-container-lowest": "#ffffff",
                        "primary-fixed": "#d8f3dc",
                        "background": "#f8f9fa",
                        "on-primary-fixed": "#081c15",
                        "error-container": "#ffdad6",
                        "surface-container": "#edeeef",
                        "surface": "#f8f9fa",
                        "on-surface-variant": "#414754",
                        "on-tertiary": "#ffffff",
                        "inverse-on-surface": "#f0f1f2"
                    },
                    borderRadius: {
                        sm: "0.125rem",
                        DEFAULT: "0.25rem",
                        md: "0.375rem",
                        lg: "0.5rem",
                        xl: "0.75rem",
                        "2xl": "1rem",
                        full: "9999px"
                    },
                    spacing: {
                        xs: "4px",
                        sm: "8px",
                        md: "16px",
                        lg: "24px",
                        xl: "32px",
                        "margin_mobile": "16px",
                        "margin_desktop": "40px"
                    },
                    fontFamily: {
                        sans: ["Inter", "sans-serif"],
                        "body-md": ["Inter"],
                        "headline-lg": ["Inter"],
                        "title-md": ["Inter"],
                        "body-sm": ["Inter"],
                        "display-lg": ["Inter"]
                    },
                    fontSize: {
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                        "title-md": ["18px", {"lineHeight": "24px", "fontWeight": "600"}],
                        "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                        "display-lg": ["44px", {"lineHeight": "52px", "letterSpacing": "-0.02em", "fontWeight": "700"}]
                    }
                }
            }
        }
    </script>
    
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fa;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .login-card {
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.04), 0 2px 8px rgba(0, 0, 0, 0.02);
            border: 1px solid rgba(114, 119, 133, 0.15);
            backdrop-filter: blur(8px);
        }
        .bg-pattern {
            background-image: radial-gradient(#0f6d38 0.5px, transparent 0.5px);
            background-size: 24px 24px;
            opacity: 0.04;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col relative justify-between overflow-x-hidden bg-background">
    
    <div class="absolute inset-0 bg-pattern pointer-events-none z-0"></div>
    <div class="absolute -top-[20%] -left-[10%] w-[50%] h-[50%] bg-primary/5 rounded-full blur-[120px] pointer-events-none"></div>
    <div class="absolute -bottom-[20%] -right-[10%] w-[50%] h-[50%] bg-secondary/5 rounded-full blur-[120px] pointer-events-none"></div>

    
    <header class="w-full flex justify-between items-center py-6 px-margin_mobile md:px-margin_desktop z-10">
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 bg-primary/10 rounded-lg flex items-center justify-center">
                <span class="material-symbols-outlined text-primary text-[24px]" data-icon="security">security</span>
            </div>
            <span class="font-bold text-lg text-primary tracking-tight">VMS Secure</span>
        </div>
        <div class="flex items-center gap-3">
            <span class="w-2.5 h-2.5 rounded-full bg-emerald-500 animate-pulse"></span>
            <span class="text-xs text-on-surface-variant font-medium hidden sm:inline">Secure Node Active</span>
        </div>
    </header>

    
    <main class="flex-grow flex items-center justify-center px-4 py-8 z-10">
        <div class="w-full max-w-[460px]">
            
            <div class="login-card bg-surface-container-lowest/90 rounded-2xl p-8 flex flex-col gap-6">
                
                <div class="text-center">
                    <h1 class="text-2xl font-bold text-on-surface tracking-tight">Welcome Back</h1>
                    <p class="text-sm text-on-surface-variant mt-1.5">Company Visitor Management System</p>
                </div>

                
                <div id="error-banner" class="hidden bg-red-50 border border-red-200 text-red-700 text-sm px-4 py-3 rounded-xl flex items-center gap-2">
                    <span class="material-symbols-outlined text-red-600 text-[20px]" data-icon="error">error</span>
                    <span id="error-message">Invalid credentials.</span>
                </div>

                
                <form class="flex flex-col gap-5" id="login-form" autocomplete="on">
                    

                    
                    <div class="flex flex-col gap-1.5">
                        <label class="text-xs font-semibold uppercase tracking-wider text-on-surface-variant" for="username">Username or Email</label>
                        <div class="relative flex items-center">
                            <span class="material-symbols-outlined absolute left-4 text-on-surface-variant text-[20px]" data-icon="person">person</span>
                            <input id="username" name="username" type="text" placeholder="username" required
                                   class="w-full h-12 bg-surface-container-low border border-outline-variant/60 rounded-xl pl-11 pr-4 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all duration-200"/>
                        </div>
                    </div>

                    
                    <div class="flex flex-col gap-1.5">
                        <div class="flex justify-between items-center">
                            <label class="text-xs font-semibold uppercase tracking-wider text-on-surface-variant" for="password">Password</label>
                            <a href="#" class="text-xs font-semibold text-primary hover:text-secondary hover:underline transition-colors">Forgot?</a>
                        </div>
                        <div class="relative flex items-center">
                            <span class="material-symbols-outlined absolute left-4 text-on-surface-variant text-[20px]" data-icon="lock">lock</span>
                            <input id="password" name="password" type="password" placeholder="••••••••" required
                                   class="w-full h-12 bg-surface-container-low border border-outline-variant/60 rounded-xl pl-11 pr-12 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all duration-200"/>
                            <button id="toggle-pw-btn" type="button" onclick="togglePasswordVisibility()" class="absolute right-4 text-on-surface-variant hover:text-primary transition-colors duration-150">
                                <span id="pw-icon" class="material-symbols-outlined text-[20px]" data-icon="visibility">visibility</span>
                            </button>
                        </div>
                    </div>

                    
                    <div class="flex items-center gap-2.5 py-0.5">
                        <label class="flex items-center cursor-pointer group select-none">
                            <input id="remember" name="remember" type="checkbox" class="sr-only peer"/>
                            <div class="w-5 h-5 border-2 border-outline-variant/80 rounded-md peer-checked:bg-primary peer-checked:border-primary transition-all duration-200 flex items-center justify-center">
                                <span class="material-symbols-outlined text-white text-[14px] hidden peer-checked:block" data-icon="check">check</span>
                            </div>
                            <span class="ml-2.5 text-sm font-medium text-on-surface-variant group-hover:text-on-surface transition-colors duration-200">Remember this kiosk device</span>
                        </label>
                    </div>

                    
                    <button id="submit-btn" type="submit" class="w-full h-12 bg-primary hover:bg-secondary text-on-primary font-semibold text-sm rounded-xl shadow-md hover:shadow-lg active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-2 mt-2 group">
                        <span>Sign In</span>
                        <span class="material-symbols-outlined text-[18px] transition-transform duration-200 group-hover:translate-x-1" data-icon="arrow_forward">arrow_forward</span>
                    </button>
                </form>

                
                <div class="mt-2 pt-5 border-t border-outline-variant/40 text-center">
                    <p class="text-xs font-medium text-on-surface-variant">
                        Are you a Visitor? 
                        <a href="/signup" class="text-primary font-bold hover:text-secondary hover:underline">Create an Account</a>
                    </p>
                </div>
            </div>
            
            
            <div class="mt-6 flex items-center justify-center gap-2 text-on-surface-variant/60 select-none">
                <span class="material-symbols-outlined text-[16px] text-emerald-600" data-icon="verified_user">verified_user</span>
                <span class="text-xs font-semibold tracking-wide uppercase">AES-256 Encrypted Session</span>
            </div>
        </div>
    </main>

    
    <footer class="w-full py-4 border-t border-outline-variant/20 bg-surface-container-low/50 flex flex-col sm:flex-row justify-between items-center px-margin_mobile md:px-margin_desktop gap-3 z-10">
        <span class="text-xs text-on-surface-variant/80">© 2026 Comapny Inc. All rights reserved.</span>
        <div class="flex gap-4 text-xs font-semibold text-on-surface-variant/80">
            <a href="#" class="hover:text-primary transition-colors">Privacy Policy</a>
            <span>•</span>
            <a href="#" class="hover:text-primary transition-colors">Security Compliance</a>
        </div>
    </footer>

    
    <script>
        function togglePasswordVisibility() {
            const pwInput = document.getElementById('password');
            const pwIcon = document.getElementById('pw-icon');
            if (pwInput.type === 'password') {
                pwInput.type = 'text';
                pwIcon.textContent = 'visibility_off';
            } else {
                pwInput.type = 'password';
                pwIcon.textContent = 'visibility';
            }
        }

        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const submitBtn = document.getElementById('submit-btn');
            const originalContent = submitBtn.innerHTML;
            const errorBanner = document.getElementById('error-banner');
            
            errorBanner.classList.add('hidden');
            submitBtn.disabled = true;
            submitBtn.innerHTML = `
                <svg class="animate-spin -ml-1 mr-2 h-4 w-4 text-white inline-block" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <span>Authenticating Credentials...</span>
            `;
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            })
            .then(response => response.json().then(data => ({ status: response.status, data })))
            .then(res => {
                if (res.status === 200) {
                    submitBtn.className = "w-full h-12 bg-emerald-600 text-white font-semibold text-sm rounded-xl shadow-md transition-all duration-300 flex items-center justify-center gap-2 mt-2";
                    submitBtn.innerHTML = `
                        <span class="material-symbols-outlined text-[20px]" data-icon="check_circle">check_circle</span>
                        <span>Access Granted. Redirecting...</span>
                    `;
                    setTimeout(() => {
                        window.location.href = res.data.redirect_url;
                    }, 800);
                } else {
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = originalContent;
                    document.getElementById('error-message').textContent = res.data.error || 'Login failed.';
                    errorBanner.classList.remove('hidden');
                }
            })
            .catch(err => {
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalContent;
                document.getElementById('error-message').textContent = 'Network error occurred. Please try again.';
                errorBanner.classList.remove('hidden');
            });
        });
    </script>
</body>
</html>
